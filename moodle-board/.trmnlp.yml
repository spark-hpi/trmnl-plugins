---
watch:
  - .trmnlp.yml
  - src

framework_version: latest

# board renders in Berlin time (affects {{ 'now' | date }} and the weekday guard)
time_zone: Europe/Berlin

# token for live polling — kept out of git. `export MOODLE_TOKEN=...` then `trmnlp serve`.
custom_fields:
  moodle_token: "{{ env.MOODLE_TOKEN }}"

# Offline sample so `trmnlp serve` renders the real board (and shows off overflow /
# "and N more" / clamping) without a token. Real courses; due dates are future-dated
# samples — refresh them if they age past.
#
# NOTE: trmnlp deep-merges `variables` ON TOP of the poll response, so these values WIN
# over live polling *locally*. That's why errorcode/exception are nulled here — an
# empty-token poll returns "invalidtoken", which would otherwise force the error state.
# On a real device .trmnlp.yml is ignored, so live polling drives the board.
#
# To preview with YOUR real Moodle data locally: comment out `courses:` (and the error
# nulls) below, then `export MOODLE_TOKEN=<token> && trmnlp serve`.
variables:
  errorcode:
  exception:
  message:
  courses:
    - id: 1127
      shortname: "Mathe 2"
      fullname: "Mathematik 2 (SoSe 2026)"
      assignments:

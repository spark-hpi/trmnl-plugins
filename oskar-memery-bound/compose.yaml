services:
  meme:
    build: .
    # `docker compose run --service-ports meme` the first time to log in
    # interactively; the session is written to ./data and reused afterwards.
    stdin_open: true
    tty: true
    ports:
      - "8080:8080"
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:?set TELEGRAM_API_ID in .env}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:?set TELEGRAM_API_HASH in .env}
      TELEGRAM_CHAT: ${TELEGRAM_CHAT:?set TELEGRAM_CHAT in .env}
      CACHE_TTL: ${CACHE_TTL:-300}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
    volumes:
      - ./data:/data
    restart: unless-stopped

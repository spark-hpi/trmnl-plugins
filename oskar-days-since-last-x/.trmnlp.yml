# TRMNLP configuration
# {{ env.VARIABLE }} interpolation is available here
---
# auto-reload when files change (`watch: false` to disable)
watch:
  - .trmnlp.yml
  - src

# values of custom fields (defined in src/settings.yml)
custom_fields:
  counter_type: student_telegram

# override variables
variables:
  trmnl: {}
  display_mode: meme
  meme_image_url: https://picsum.photos/600/400
  meme_message: When the most-liked meme finally shows its caption
